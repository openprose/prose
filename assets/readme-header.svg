<svg viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <pattern id="paperTexture" patternUnits="userSpaceOnUse" width="120" height="120">
      <rect width="120" height="120" fill="#FAF7F0"/>
      <circle cx="22" cy="28" r="0.55" fill="#E8DFD0" opacity="0.45"/>
      <circle cx="82" cy="70" r="0.35" fill="#E8DFD0" opacity="0.35"/>
      <circle cx="58" cy="12" r="0.45" fill="#E8DFD0" opacity="0.4"/>
      <circle cx="12" cy="88" r="0.4" fill="#E8DFD0" opacity="0.32"/>
      <circle cx="108" cy="42" r="0.5" fill="#E8DFD0" opacity="0.28"/>
    </pattern>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A743D" stop-opacity="0"/>
      <stop offset="18%" stop-color="#8A743D" stop-opacity="1"/>
      <stop offset="82%" stop-color="#8A743D" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8A743D" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1C1917" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1000" height="280" rx="10" fill="url(#paperTexture)"/>
  <rect x="1" y="1" width="998" height="278" rx="9" fill="none" stroke="#EDE6D6" stroke-width="2"/>

  <text x="500" y="58" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="0.5">
    <tspan fill="#8A743D">Open</tspan><tspan fill="#1C1917">Prose</tspan>
  </text>

  <text x="500" y="136" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="400" letter-spacing="0">
    <tspan fill="#8A743D">Engineer</tspan><tspan fill="#1C1917" dx="16">your agents.</tspan>
  </text>

  <text x="500" y="184" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#57534E">
    Contracts, composition, and version control for the Markdown your agents run on.
  </text>

  <g filter="url(#softShadow)">
    <rect x="240" y="212" width="520" height="48" rx="8" fill="#1C1917"/>
    <text x="275" y="243" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="18" fill="#FAF7F0" letter-spacing="1">
      <tspan fill="#8A743D">$</tspan><tspan dx="16">npx skills add openprose/prose</tspan>
    </text>
  </g>

  <path d="M 32 32 L 32 58 M 32 32 L 58 32" stroke="#A8A29E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 968 32 L 968 58 M 968 32 L 942 32" stroke="#A8A29E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 32 248 L 32 222 M 32 248 L 58 248" stroke="#A8A29E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 968 248 L 968 222 M 968 248 L 942 248" stroke="#A8A29E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
